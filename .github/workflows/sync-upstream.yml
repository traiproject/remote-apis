name: Sync upstream remote-apis

on:
  schedule:
    - cron: "0 3 * * *" # daily 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name  "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"

      - name: Add upstream + fetch
        run: |
          git remote add upstream https://github.com/bazelbuild/remote-apis.git
          git fetch upstream --tags

      - name: Rebase our main onto upstream/main
        run: |
          git checkout main
          git rebase upstream/main

      - name: Push updated main + tags
        run: |
          git push origin main --force-with-lease
          git push origin --tags
